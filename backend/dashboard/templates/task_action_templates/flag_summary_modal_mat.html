<style>
  @media (min-width: 576px){
    .modal-dialog {
        max-width: 1000px !important;
        margin: 1.75rem auto;
    }
  }
</style>

<div class="modal fade" id="material_flag_taskaction_modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog " role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-primary-d3" id="exampleModalLabel">
          Material Flags Overall Summary 
        </h5>

        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
       

        <div class="col-lg-12">
          <div class="mt-4 mt-lg-0 card dcard h-auto overflow-hidden shadow border-t-0">
            <div class="card-body p-0 table-responsive-xl">
              <table class="table text-dark-m1 brc-black-tp10 mb-1">
                <thead>
                  <tr class="bgc-white text-secondary-d3 text-95">
                    <th class="py-3 pl-35">
                      Flag
                    </th>
                    <th>
                      Total Raised
                    </th>
                    <th>
                      Total Cleared
                    </th>
                  </tr>
                </thead>
                
                <tbody>
                  {% for entry in material_flag_stats %}
                    <tr class="bgc-h-orange-l4">
                      <td class="pl-35">
                        <i class="fa fa-flag mr-2px" style="color: {{entry.flag_color}};font-size:25px;"></i> 
                      </td>
        
                      <td class="text-dark-m3">
                        {{entry.raised_count}}
                      </td>
        
                      <td class="text-dark-l1 text-95">
                        {{entry.cleared_count}}
                      </td>
                    </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div><!-- /.card-body -->
          </div>
        </div>
        <!-- modal body -->
      </div>

    </div>
  </div>
</div>

{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}
{% load i18n static project_template_tags %}

{% block extrastyle %}
<link rel="stylesheet" type="text/css" href="{% static 'assets/node_modules/tiny-date-picker/tiny-date-picker.css' %}" />
<link rel="stylesheet" type="text/css" href="{% static 'assets/node_modules/tiny-date-picker/date-range-picker.css' %}" />

<link rel="stylesheet" type="text/css" href="{% static 'assets/node_modules/eonasdan-bootstrap-datetimepicker/build/css/bootstrap-datetimepicker.css' %}" />
{% endblock %}

{% block content %}
 
<style type="text/css">
  .elem,
  .elem * {
    box-sizing: border-box;
    margin: 0 !important;
  }

  .elem {
    display: inline-block;
    font-size: 0;
    width: 33%;
    border: 20px solid transparent;
    border-bottom: none;
    background: #fff;
    padding: 10px;
    height: auto;
    background-clip: padding-box;
  }

  .elem>span {
    display: block;
    cursor: pointer;
    height: 0;
    padding-bottom: 70%;
    background-size: cover;
    background-position: center center;
  }
</style>

<!-- LIGHTBOX FADING SHOW/HIDE EFFECT (as explained in documentation) -->
<style type="text/css">
  .lcl_fade_oc.lcl_pre_show #lcl_overlay,
  .lcl_fade_oc.lcl_pre_show #lcl_window,
  .lcl_fade_oc.lcl_is_closing #lcl_overlay,
  .lcl_fade_oc.lcl_is_closing #lcl_window {
    opacity: 0 !important;
  }

  .lcl_fade_oc.lcl_is_closing #lcl_overlay {
    -webkit-transition-delay: .15s !important;
    transition-delay: .15s !important;
  }

 
    /* .img1{
        text-align: end;
    }
    .img2{
        text-align: start;
    } */
    @media screen and (min-width: 280px) and (max-width: 510px){
      .main{
        width:  400px;
      }
    }
   
</style>


  <!-- Graphs -->
  <div class="row">

    <div class="col-12 col-lg-12 mt-3 pt-3">
      <div class="bcard card h-100 shadow-lg p-3 mb-5 bg-white rounded">
        <div class="card-header border-b-1 brc-grey-l3 pb-2">
          <h5 class="card-title font-normal text-120 text-dark-m1 pl-1">
            Organizational Hierarchy For Current User
          </h5>
          <!-- the dropdowns -->
          <div class="card-toolbar no-border">
          </div><!-- /.card-toolbar -->
        </div>
        <figure class="highcharts-figure">
          <div id="organizational_chart"></div>
      </figure>
      </div><!-- /.card -->
    </div>
  </div>


{% endblock %}

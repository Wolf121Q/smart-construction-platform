{% load i18n bootstrap_admin_template_tags %}
  {% for field in action_form.visible_fields %}
    <div class="input-group" title="{{ field.label }}">
      <label>
      <i class="fas fa-tasks pos-abs mt-2 pt-3px ml-25 text-blue-m2"></i>
      {{ field|add_class:'form-control pl-45 radius-round' }}
      </label>
      <span class="input-group-btn">
        <button type="submit" class="btn radius-round btn-outline-primary border-2 btn-sm ml-2" title="{% trans "Run the selected action" %}" name="index" value="{{ action_index|default:0 }}">{% trans "Go" %}</button>
      </span>
    </div>
  {% endfor %}
  {% for field in action_form.hidden_fields %}{{field}}{% endfor %}
